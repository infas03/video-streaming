services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: videouser
      POSTGRES_PASSWORD: videopass
      POSTGRES_DB: videodb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/videos --ignore-existing;
      mc anonymous set download local/videos/hls;
      exit 0;
      "

  api:
    build:
      context: ./server
    command: api-server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgres://videouser:videopass@postgres:5432/videodb
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: videos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      MAX_UPLOAD_BYTES: "1073741824"
      RUST_LOG: info
    ports:
      - "3001:3001"

  worker:
    build:
      context: ./server
    command: transcode-worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgres://videouser:videopass@postgres:5432/videodb
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: videos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      RUST_LOG: info

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - client_build:/usr/share/nginx/html

  client:
    build:
      context: ./client
    volumes:
      - client_build:/usr/share/nginx/html

volumes:
  postgres_data:
  minio_data:
  client_build:
